name = "allin-copy-trading"
main = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── KV Namespace for token metadata cache ────────────────────────────────────
# Create with: wrangler kv namespace create TOKEN_CACHE
# Then replace the id below with the output
[[kv_namespaces]]
binding = "TOKEN_CACHE"
id      = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# ── Secrets (set via CLI, never in this file) ────────────────────────────────
# Run these commands to set secrets:
#
#   wrangler secret put HELIUS_KEY
#   → Enter your Helius API key (get from dashboard.helius.dev)
#
#   wrangler secret put ALLOWED_ORIGINS
#   → Enter your frontend domain, e.g.: https://allin.yourdomain.com
#   → For multiple domains: https://allin.yourdomain.com,https://yourdomain.com
#
# IMPORTANT: After setting secrets, rotate your old Helius key immediately
# at https://dashboard.helius.dev if it was previously exposed in source code.

# ── Local dev (wrangler dev) ─────────────────────────────────────────────────
# Create a .dev.vars file (gitignored) for local development:
#
#   HELIUS_KEY=your-helius-api-key-here
#   ALLOWED_ORIGINS=http://localhost:8787
#
# .dev.vars is automatically loaded by `wrangler dev` and NEVER deployed.
